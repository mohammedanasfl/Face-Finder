services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: facefind-backend
    ports:
      - "8000:8000"
    volumes:
      # Mount the data directories so that uploaded and processed images persist on the host machine
      - ./data:/app/data
      - ./database:/app/database
      - ./uploads:/app/uploads
      - ./models:/root/.insightface/models
    environment:
      - PYTHONUNBUFFERED=1
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?set JWT_SECRET_KEY}
      - ADMIN_SECRET_KEY=${ADMIN_SECRET_KEY:?set ADMIN_SECRET_KEY}
      - USER_SECRET_KEY=${USER_SECRET_KEY:?set USER_SECRET_KEY}
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      - SEARCH_SIMILARITY_THRESHOLD=${SEARCH_SIMILARITY_THRESHOLD:-0.40}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    restart: unless-stopped
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: facefind-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: facefind-celery-worker
    command: celery -A app.workers.celery_worker worker --loglevel=info
    volumes:
      - ./data:/app/data
      - ./database:/app/database
      - ./uploads:/app/uploads
      - ./models:/root/.insightface/models
    environment:
      - PYTHONUNBUFFERED=1
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?set JWT_SECRET_KEY}
      - ADMIN_SECRET_KEY=${ADMIN_SECRET_KEY:?set ADMIN_SECRET_KEY}
      - USER_SECRET_KEY=${USER_SECRET_KEY:?set USER_SECRET_KEY}
      - SEARCH_SIMILARITY_THRESHOLD=${SEARCH_SIMILARITY_THRESHOLD:-0.40}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend/react-app
      dockerfile: Dockerfile
    container_name: facefind-frontend
    ports:
      - "5173:80" # Exposes the Nginx server on port 5173 to match the Vite dev server expected port
    depends_on:
      - backend
    restart: unless-stopped
