server {
    listen 80;
    server_name localhost;
    
    root /usr/share/nginx/html;
    index index.html;

    # Any route that doesn't have a file extension (e.g. /dashboard)
    # should fallback to index.html so React Router can handle it.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
