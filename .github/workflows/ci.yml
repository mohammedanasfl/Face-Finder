name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-test.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install test dependencies
        # Use requirements-test.txt to skip heavy AI packages (insightface, faiss, onnxruntime)
        # which are not needed for unit tests since all AI calls are mocked.
        run: pip install -r requirements-test.txt

      - name: Run tests
        env:
          JWT_SECRET_KEY: test-jwt-secret
          ADMIN_SECRET_KEY: test-admin-secret
          USER_SECRET_KEY: test-user-secret
        run: python -m pytest tests/ -v --tb=short
