name: CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-test.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install test dependencies
        # Use requirements-test.txt to skip heavy AI packages (insightface, faiss, onnxruntime)
        # which are not needed for unit tests since all AI calls are mocked.
        run: pip install -r requirements-test.txt

      - name: Run tests
        env:
          JWT_SECRET_KEY: test-jwt-secret
          ADMIN_SECRET_KEY: test-admin-secret
          USER_SECRET_KEY: test-user-secret
        run: python -m pytest tests/ -v --tb=short

  deploy:
    name: Deploy to HuggingFace Spaces
    runs-on: ubuntu-latest
    needs: test  # only runs if the test job passes
    # only deploy on direct pushes to main, not on pull requests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for git push

      - name: Push to HuggingFace Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "ci-bot@github.com"
          git config user.name "GitHub CI Bot"
          git remote add huggingface https://anas21072001:$HF_TOKEN@huggingface.co/spaces/anas21072001/Face-Finder
          git push huggingface main --force

